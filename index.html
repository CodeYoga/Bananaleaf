<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#0d1f0f">
<title>Banana Leaf – Meal Tracker</title>
<link rel="manifest" href="manifest.json">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,400&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#0d1f0f;
    --surface:#122114;
    --surface2:#1a2e1c;
    --border:#243d27;
    --border2:#2f5233;
    --accent:#c8a84b;
    --accent2:#e85d2f;
    --accent3:#7ec850;
    --text:#e8f0e0;
    --text2:#8faa80;
    --text3:#4a6b45;
    --success:#7ec850;
    --radius:16px;
    --radius-sm:10px;
    --shadow:0 8px 32px rgba(0,0,0,0.5)
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;min-height:100vh;overflow-x:hidden}

  /* Subtle leaf-vein texture overlay */
  body::before{content:'';position:fixed;inset:0;pointer-events:none;z-index:0;
    background-image:
      repeating-linear-gradient(82deg,rgba(126,200,80,0.018) 0px,rgba(126,200,80,0.018) 1px,transparent 1px,transparent 60px),
      repeating-linear-gradient(170deg,rgba(126,200,80,0.012) 0px,rgba(126,200,80,0.012) 1px,transparent 1px,transparent 80px);
  }

  h1,h2,h3{font-family:'Syne',sans-serif}
  .header{position:sticky;top:0;z-index:100;
    background:linear-gradient(180deg,rgba(13,31,15,0.98) 75%,transparent);
    padding:18px 16px 12px;
  }
  .header-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
  .logo{font-family:'Syne',sans-serif;font-size:22px;font-weight:800;letter-spacing:-0.03em;display:flex;align-items:center;gap:8px}
  .logo-leaf{font-size:20px;line-height:1}
  .logo em{color:var(--accent);font-style:normal}
  .header-right{display:flex;gap:8px;align-items:center}
  .btn-icon{background:var(--surface);border:1px solid var(--border);color:var(--text2);border-radius:50%;width:40px;height:40px;display:flex;align-items:center;justify-content:center;font-size:18px;cursor:pointer;transition:background 0.15s;flex-shrink:0}
  .btn-icon:active{background:var(--surface2)}
  .sync-dot{width:8px;height:8px;border-radius:50%;background:var(--text3);flex-shrink:0;transition:background 0.3s}
  .sync-dot.synced{background:var(--success)}.sync-dot.syncing{background:var(--accent);animation:pulse 1s infinite}.sync-dot.error{background:var(--accent2)}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:0.35}}

  /* Week nav */
  .week-nav{display:flex;align-items:center;justify-content:space-between;gap:12px}
  .week-nav-center{display:flex;flex-direction:column;align-items:center;gap:5px}
  .week-label{font-family:'Syne',sans-serif;font-size:15px;font-weight:700;color:var(--text);letter-spacing:-0.01em}
  .nav-btn{background:var(--surface);border:1px solid var(--border);color:var(--text2);border-radius:50%;width:36px;height:36px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:18px;flex-shrink:0;transition:all 0.15s}
  .nav-btn:active{background:var(--surface2)}
  .today-btn{background:rgba(200,168,75,0.1);border:1px solid rgba(200,168,75,0.3);color:var(--accent);border-radius:99px;padding:3px 12px;font-size:11px;font-family:'DM Sans',sans-serif;font-weight:500;cursor:pointer;transition:all 0.15s;letter-spacing:0.03em}
  .today-btn:active{background:rgba(200,168,75,0.2)}

  /* Table */
  .table-wrap{padding:16px 16px 100px;overflow-x:auto;position:relative;z-index:1}
  table{width:100%;border-collapse:separate;border-spacing:0;min-width:420px}
  thead th{
    font-family:'Syne',sans-serif;font-size:10px;font-weight:700;letter-spacing:0.1em;
    text-transform:uppercase;color:var(--text3);padding:10px 12px 10px;text-align:left;
    border-bottom:1px solid var(--border)
  }
  thead th:first-child{width:68px}
  tbody tr{cursor:pointer;transition:background 0.12s;border-bottom:1px solid var(--border)}
  tbody tr:last-child td{border-bottom:none}
  tbody tr td{border-bottom:1px solid var(--border)}
  tbody tr:last-child td{border-bottom:none}
  tbody tr:active{background:var(--surface2)}
  tbody tr:hover{background:rgba(126,200,80,0.04)}
  tbody tr.today td{background:rgba(200,168,75,0.06)}
  tbody tr.today:hover td{background:rgba(200,168,75,0.09)}
  tbody tr.today .day-name{color:var(--accent)}
  td{padding:13px 12px;vertical-align:top;font-size:13px}
  .day-cell{display:flex;flex-direction:column;gap:2px}
  .day-name{font-family:'Syne',sans-serif;font-weight:700;font-size:12px;text-transform:uppercase;letter-spacing:0.05em;color:var(--text)}
  .day-date{font-size:11px;color:var(--text3)}
  .meal-val{color:var(--text);line-height:1.45;font-size:13px;font-weight:300}
  .meal-empty{color:var(--text3);font-size:12px}

  /* Drive banner */
  .gdrive-banner{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:14px 16px;margin:0 16px 14px;display:flex;align-items:center;gap:12px;position:relative;z-index:1}
  .gdrive-banner-text{flex:1;font-size:13px;color:var(--text2);line-height:1.5}
  .gdrive-banner-text strong{color:var(--text);display:block;margin-bottom:2px}
  .btn-gdrive{background:var(--accent);border:none;color:#1a0f00;border-radius:var(--radius-sm);padding:8px 14px;font-family:'Syne',sans-serif;font-size:13px;font-weight:700;cursor:pointer;flex-shrink:0;white-space:nowrap}

  /* Overlays */
  .overlay{position:fixed;inset:0;background:rgba(5,12,6,0.88);backdrop-filter:blur(6px);z-index:300;display:flex;align-items:flex-end;justify-content:center;opacity:0;pointer-events:none;transition:opacity 0.2s}
  .overlay.open{opacity:1;pointer-events:all}
  .sheet{background:var(--surface);border:1px solid var(--border);border-radius:24px 24px 0 0;width:100%;max-width:600px;padding:20px 20px 36px;transform:translateY(30px);transition:transform 0.25s cubic-bezier(.22,1,.36,1);max-height:92vh;overflow-y:auto}
  .overlay.open .sheet{transform:translateY(0)}
  .sheet-handle{width:36px;height:4px;background:var(--border2);border-radius:99px;margin:0 auto 20px}
  .sheet-title{font-family:'Syne',sans-serif;font-size:20px;font-weight:700;color:var(--text);margin-bottom:4px}
  .sheet-sub{font-size:13px;color:var(--text3);margin-bottom:22px;font-style:italic}

  /* Meal fields */
  .meal-fields{display:flex;flex-direction:column;gap:14px;margin-bottom:4px}
  .form-group{display:flex;flex-direction:column;gap:7px}
  .form-label{font-size:11px;font-weight:600;color:var(--text2);letter-spacing:0.07em;text-transform:uppercase;display:flex;align-items:center;gap:6px}
  .form-label-icon{font-size:14px;line-height:1}
  .form-textarea{
    width:100%;background:var(--surface2);border:1.5px solid var(--border);border-radius:var(--radius-sm);
    padding:11px 13px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:15px;font-weight:300;
    outline:none;transition:border-color 0.2s;resize:none;height:70px;line-height:1.5
  }
  .form-textarea:focus{border-color:var(--accent)}
  .form-textarea::placeholder{color:var(--text3)}

  /* Form actions */
  .form-actions{display:flex;gap:10px;margin-top:22px}
  .btn-primary{
    flex:1;background:var(--accent);border:none;color:#0d1f0f;border-radius:var(--radius-sm);
    padding:14px;font-family:'Syne',sans-serif;font-size:15px;font-weight:700;cursor:pointer;transition:opacity 0.15s
  }
  .btn-primary:active{opacity:0.85}
  .btn-secondary{
    background:var(--surface2);border:1px solid var(--border);color:var(--text2);border-radius:var(--radius-sm);
    padding:14px 20px;font-family:'DM Sans',sans-serif;font-size:15px;cursor:pointer
  }
  .btn-danger{
    flex:1;background:rgba(232,93,47,0.1);border:1px solid rgba(232,93,47,0.25);color:var(--accent2);
    border-radius:var(--radius-sm);padding:14px;font-family:'Syne',sans-serif;font-size:15px;font-weight:700;cursor:pointer
  }
  .info-box{background:var(--surface2);border-radius:var(--radius-sm);padding:14px;font-size:14px;color:var(--text2);line-height:1.8}

  /* Decorative stripe at top of today row */
  tbody tr.today td:first-child{border-left:2px solid var(--accent)}

  /* Toast */
  .toast{position:fixed;bottom:28px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--surface);border:1px solid var(--border2);border-radius:99px;padding:10px 22px;font-size:14px;font-weight:500;color:var(--text);box-shadow:var(--shadow);opacity:0;transition:opacity 0.2s,transform 0.2s;white-space:nowrap;z-index:999;pointer-events:none}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
  .toast.success{border-color:rgba(126,200,80,0.5);color:var(--success)}
  .toast.error{border-color:rgba(232,93,47,0.4);color:var(--accent2)}
  .toast.info{border-color:rgba(200,168,75,0.5);color:var(--accent)}

  @media(min-width:600px){
    .table-wrap,.header,.gdrive-banner{max-width:720px;margin-left:auto;margin-right:auto}
    .overlay{align-items:center}
    .sheet{border-radius:24px;margin-bottom:20px}
  }
</style>
</head>
<body>

<div class="header" style="position:relative;z-index:1">
  <div class="header-top">
    <div class="logo">
      <span class="logo-leaf">🍃</span>
      Banana <em>Leaf</em>
    </div>
    <div class="header-right">
      <div class="sync-dot" id="syncDot" title="Sync status"></div>
      <div class="btn-icon" id="driveBtn" onclick="handleDriveBtn()" title="Google Drive sync">☁️</div>
    </div>
  </div>
  <div class="week-nav">
    <button class="nav-btn" onclick="changeWeek(-1)">‹</button>
    <div class="week-nav-center">
      <div class="week-label" id="weekLabel"></div>
      <button class="today-btn" onclick="goToToday()">This week</button>
    </div>
    <button class="nav-btn" onclick="changeWeek(1)">›</button>
  </div>
</div>

<div class="gdrive-banner" id="gdriveBanner" style="display:none">
  <div style="font-size:22px">☁️</div>
  <div class="gdrive-banner-text">
    <strong>Sync across all devices</strong>
    Connect Google Drive so your meals are saved everywhere.
  </div>
  <button class="btn-gdrive" onclick="signIn()">Sign in</button>
</div>

<div class="table-wrap">
  <table>
    <thead>
      <tr>
        <th>Day</th>
        <th>Breakfast</th>
        <th>Lunch</th>
        <th>Dinner</th>
        <th>Snack</th>
      </tr>
    </thead>
    <tbody id="weekBody"></tbody>
  </table>
</div>

<div class="toast" id="toast"></div>

<!-- EDIT MEAL SHEET -->
<div class="overlay" id="editOverlay" onclick="closeOnBg(event,'editOverlay')">
  <div class="sheet">
    <div class="sheet-handle"></div>
    <div class="sheet-title" id="editTitle"></div>
    <div class="sheet-sub" id="editSub"></div>
    <div class="meal-fields">
      <div class="form-group">
        <label class="form-label"><span class="form-label-icon">🌅</span> Breakfast</label>
        <textarea class="form-textarea" id="fBreakfast" placeholder="e.g. Idli with sambar and chutney…"></textarea>
      </div>
      <div class="form-group">
        <label class="form-label"><span class="form-label-icon">☀️</span> Lunch</label>
        <textarea class="form-textarea" id="fLunch" placeholder="e.g. Rice, rasam, kootu, papad…"></textarea>
      </div>
      <div class="form-group">
        <label class="form-label"><span class="form-label-icon">🌙</span> Dinner</label>
        <textarea class="form-textarea" id="fDinner" placeholder="e.g. Chapati with dal and sabzi…"></textarea>
      </div>
      <div class="form-group">
        <label class="form-label"><span class="form-label-icon">🍎</span> Snack</label>
        <textarea class="form-textarea" id="fSnack" placeholder="e.g. Murukku, chai, fruit…"></textarea>
      </div>
    </div>
    <div class="form-actions">
      <button class="btn-secondary" onclick="closeOverlay('editOverlay')">Cancel</button>
      <button class="btn-primary" onclick="saveMeal()">Save</button>
    </div>
  </div>
</div>

<!-- DRIVE INFO SHEET -->
<div class="overlay" id="driveInfoOverlay" onclick="closeOnBg(event,'driveInfoOverlay')">
  <div class="sheet">
    <div class="sheet-handle"></div>
    <div class="sheet-title">Google Drive Sync</div>
    <div id="driveInfoBody" style="margin-top:16px"></div>
    <div style="margin-top:16px"><button class="btn-secondary" style="width:100%" onclick="closeOverlay('driveInfoOverlay')">Close</button></div>
  </div>
</div>

<script src="https://accounts.google.com/gsi/client" async defer></script>
<script>
// ── CONFIG ────────────────────────────────────
const CLIENT_ID = 'YOUR_GOOGLE_CLIENT_ID';
const SCOPES = 'https://www.googleapis.com/auth/drive.appdata';
const DATA_FILE = 'bananaleaf-meals.json';

// ── STATE ─────────────────────────────────────
let meals = {};
let currentWeekStart = getWeekStart(new Date());
let editingDate = null;
let accessToken = null, driveFileId = null, syncTimer = null, saving = false;

// ── UTILS ─────────────────────────────────────
function pad(n){ return String(n).padStart(2,'0'); }
function dateKey(d){ return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`; }
function addDays(d,n){ const r=new Date(d); r.setDate(r.getDate()+n); return r; }
function getWeekStart(d){
  const r=new Date(d); r.setHours(0,0,0,0);
  const day=r.getDay(); const diff=day===0?-6:1-day;
  r.setDate(r.getDate()+diff); return r;
}
function fmtDay(d){ return d.toLocaleDateString('en-US',{weekday:'short'}).toUpperCase(); }
function fmtDate(d){ return d.toLocaleDateString('en-US',{month:'short',day:'numeric'}); }
function fmtWeek(start){
  const end=addDays(start,6);
  const sm=start.toLocaleDateString('en-US',{month:'short'});
  const em=end.toLocaleDateString('en-US',{month:'short'});
  if(sm===em) return `${sm} ${start.getDate()} – ${end.getDate()}`;
  return `${sm} ${start.getDate()} – ${em} ${end.getDate()}`;
}
const esc=s=>String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');

function toast(msg,type='success'){
  const el=document.getElementById('toast');
  el.textContent=msg; el.className='toast '+type+' show';
  setTimeout(()=>el.className='toast',2500);
}
function setSyncDot(s){
  const d=document.getElementById('syncDot');
  d.className='sync-dot '+(s==='syncing'?'syncing':s==='synced'?'synced':s==='error'?'error':'');
  d.title={syncing:'Saving to Drive…',synced:'Saved to Drive ✓',error:'Drive sync error',idle:'Not connected to Drive'}[s]||'';
}

// ── LOCAL STORAGE ─────────────────────────────
function saveLocal(){ try{ localStorage.setItem('bl_meals', JSON.stringify(meals)); }catch{} }
function loadLocal(){ try{ const m=localStorage.getItem('bl_meals'); if(m) meals=JSON.parse(m); }catch{} }

// ── RENDER ────────────────────────────────────
function renderWeek(){
  document.getElementById('weekLabel').textContent = fmtWeek(currentWeekStart);
  const tbody = document.getElementById('weekBody');
  const todayKey = dateKey(new Date());
  let html = '';
  for(let i=0;i<7;i++){
    const d = addDays(currentWeekStart, i);
    const key = dateKey(d);
    const m = meals[key] || {};
    const isToday = key === todayKey;
    const cell = v => v
      ? `<span class="meal-val">${esc(v)}</span>`
      : `<span class="meal-empty">—</span>`;
    html += `<tr class="${isToday?'today':''}" onclick="openEdit('${key}','${fmtDay(d)} ${fmtDate(d)}')">
      <td><div class="day-cell"><span class="day-name">${fmtDay(d)}</span><span class="day-date">${fmtDate(d)}</span></div></td>
      <td>${cell(m.breakfast)}</td>
      <td>${cell(m.lunch)}</td>
      <td>${cell(m.dinner)}</td>
      <td>${cell(m.snack)}</td>
    </tr>`;
  }
  tbody.innerHTML = html;
}

function changeWeek(dir){ currentWeekStart=addDays(currentWeekStart,dir*7); renderWeek(); }
function goToToday(){ currentWeekStart=getWeekStart(new Date()); renderWeek(); }

// ── EDIT SHEET ────────────────────────────────
function openEdit(key, label){
  editingDate = key;
  const m = meals[key] || {};
  document.getElementById('editTitle').textContent = label;
  document.getElementById('editSub').textContent = key;
  document.getElementById('fBreakfast').value = m.breakfast || '';
  document.getElementById('fLunch').value     = m.lunch     || '';
  document.getElementById('fDinner').value    = m.dinner    || '';
  document.getElementById('fSnack').value     = m.snack     || '';
  openOverlay('editOverlay');
  setTimeout(()=>document.getElementById('fBreakfast').focus(),300);
}
function saveMeal(){
  if(!editingDate) return;
  const entry={
    breakfast:document.getElementById('fBreakfast').value.trim(),
    lunch:    document.getElementById('fLunch').value.trim(),
    dinner:   document.getElementById('fDinner').value.trim(),
    snack:    document.getElementById('fSnack').value.trim(),
  };
  if(entry.breakfast||entry.lunch||entry.dinner||entry.snack){ meals[editingDate]=entry; }
  else{ delete meals[editingDate]; }
  closeOverlay('editOverlay');
  scheduleSave();
  renderWeek();
  toast('Saved ✓');
}

// ── OVERLAYS ──────────────────────────────────
function openOverlay(id){ document.getElementById(id).classList.add('open'); }
function closeOverlay(id){ document.getElementById(id).classList.remove('open'); }
function closeOnBg(e,id){ if(e.target===document.getElementById(id)) closeOverlay(id); }

// ── GOOGLE AUTH ───────────────────────────────
function initGoogleAuth(){
  if(typeof google==='undefined'||!google.accounts){ setTimeout(initGoogleAuth,600); return; }
  const tok=sessionStorage.getItem('bl_token');
  if(tok){ accessToken=tok; onSignedIn(false); }
  else{ document.getElementById('gdriveBanner').style.display='flex'; setSyncDot('idle'); }
}
function signIn(){
  if(typeof google==='undefined'){ toast('Google not ready','error'); return; }
  google.accounts.oauth2.initTokenClient({
    client_id:CLIENT_ID, scope:SCOPES,
    callback:r=>{
      if(r.error){ toast('Sign-in failed','error'); return; }
      accessToken=r.access_token;
      sessionStorage.setItem('bl_token',accessToken);
      onSignedIn(true);
    }
  }).requestAccessToken();
}
function onSignedIn(fresh){
  document.getElementById('gdriveBanner').style.display='none';
  document.getElementById('driveBtn').textContent='✅';
  setSyncDot('syncing');
  if(fresh) toast('Connected to Google Drive ✓','info');
  loadFromDrive();
}
function handleDriveBtn(){ accessToken?showDriveInfo():signIn(); }
function showDriveInfo(){
  document.getElementById('driveInfoBody').innerHTML=`
    <div class="info-box">✅ Connected to Google Drive<br>📁 Saved to: <strong style="color:var(--text)">App Data folder</strong><br>🔄 Auto-saves after every change<br>🔒 Private — only Banana Leaf can access it</div>
    <div style="margin-top:12px"><button class="btn-danger" style="width:100%" onclick="signOut()">Disconnect Drive</button></div>`;
  openOverlay('driveInfoOverlay');
}
function signOut(){
  accessToken=null; driveFileId=null;
  sessionStorage.removeItem('bl_token');
  document.getElementById('driveBtn').textContent='☁️';
  document.getElementById('gdriveBanner').style.display='flex';
  setSyncDot('idle'); closeOverlay('driveInfoOverlay');
  toast('Disconnected from Drive');
}

// ── DRIVE LOAD ────────────────────────────────
async function loadFromDrive(){
  if(!accessToken){ loadLocal(); renderWeek(); return; }
  setSyncDot('syncing');
  try{
    const r=await fetch(
      `https://www.googleapis.com/drive/v3/files?spaces=appDataFolder&fields=files(id,name)&q=name%3D%27${DATA_FILE}%27`,
      {headers:{Authorization:'Bearer '+accessToken}}
    );
    const d=await r.json();
    if(d.files&&d.files.length){
      driveFileId=d.files[0].id;
      const fr=await fetch(`https://www.googleapis.com/drive/v3/files/${driveFileId}?alt=media`,
        {headers:{Authorization:'Bearer '+accessToken}});
      const data=await fr.json();
      meals=data.meals||{}; saveLocal(); setSyncDot('synced'); toast('Loaded from Drive ✓');
    }else{
      loadLocal(); setSyncDot('synced');
      if(Object.keys(meals).length) saveToDrive();
    }
  }catch(e){ console.error(e); loadLocal(); setSyncDot('error'); toast('Drive load failed','error'); }
  renderWeek();
}

// ── DRIVE SAVE ────────────────────────────────
function scheduleSave(){
  saveLocal();
  if(!accessToken){ setSyncDot('idle'); return; }
  setSyncDot('syncing'); clearTimeout(syncTimer);
  syncTimer=setTimeout(saveToDrive,1500);
}
async function saveToDrive(){
  if(!accessToken||saving) return;
  saving=true;
  const payload=JSON.stringify({meals,savedAt:Date.now()});
  try{
    if(driveFileId){
      await fetch(`https://www.googleapis.com/upload/drive/v3/files/${driveFileId}?uploadType=media`,{
        method:'PATCH',headers:{Authorization:'Bearer '+accessToken,'Content-Type':'application/json'},body:payload});
    }else{
      const form=new FormData();
      form.append('metadata',new Blob([JSON.stringify({name:DATA_FILE,parents:['appDataFolder']})],{type:'application/json'}));
      form.append('file',new Blob([payload],{type:'application/json'}));
      const res=await fetch('https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart&fields=id',
        {method:'POST',headers:{Authorization:'Bearer '+accessToken},body:form});
      driveFileId=(await res.json()).id;
    }
    setSyncDot('synced');
  }catch(e){ console.error(e); setSyncDot('error'); toast('Drive save failed','error'); }
  saving=false;
}

// ── SERVICE WORKER ────────────────────────────
if('serviceWorker' in navigator){ navigator.serviceWorker.register('sw.js').catch(()=>{}); }

// ── INIT ──────────────────────────────────────
loadLocal(); renderWeek(); initGoogleAuth();
</script>
