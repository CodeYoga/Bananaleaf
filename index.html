<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Nourish — Daily Meal Tracker</title>
  <link rel="manifest" href="manifest.json" />
  <meta name="theme-color" content="#1a1a2e" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- Auth Screen -->
  <div id="auth-screen" class="screen active">
    <div class="auth-bg"></div>
    <div class="auth-content">
      <div class="logo-mark">✦</div>
      <h1 class="brand">Nourish</h1>
      <p class="brand-sub">Your personal meal journal,<br/>synced to Google Drive.</p>
      <button id="sign-in-btn" class="btn-primary">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg>
        Continue with Google
      </button>
      <p class="auth-note">Your data is stored privately in your own Google Drive.</p>
    </div>
  </div>

  <!-- Main App -->
  <div id="app-screen" class="screen">

    <header class="app-header">
      <div class="header-left">
        <span class="logo-sm">✦ Nourish</span>
      </div>
      <div class="header-right">
        <button id="sync-btn" class="icon-btn" title="Sync to Drive">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="23 4 23 10 17 10"/><polyline points="1 20 1 14 7 14"/><path d="M3.51 9a9 9 0 0114.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0020.49 15"/></svg>
        </button>
        <div id="user-avatar" class="user-avatar" title="Signed in"></div>
        <button id="sign-out-btn" class="icon-btn" title="Sign out">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
        </button>
      </div>
    </header>

    <main class="app-main">

      <!-- Week View -->
      <section id="week-view">
        <div class="week-nav">
          <button id="prev-week" class="nav-arrow">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="15 18 9 12 15 6"/></svg>
          </button>
          <div class="week-label-wrap">
            <h2 id="week-label" class="week-label"></h2>
            <button id="today-btn" class="today-chip">Today</button>
          </div>
          <button id="next-week" class="nav-arrow">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="9 18 15 12 9 6"/></svg>
          </button>
        </div>

        <div class="table-wrap">
          <table class="meal-table">
            <thead>
              <tr>
                <th class="col-day">Day</th>
                <th>Breakfast</th>
                <th>Lunch</th>
                <th>Dinner</th>
                <th>Snack</th>
              </tr>
            </thead>
            <tbody id="week-tbody"></tbody>
          </table>
        </div>
      </section>

    </main>
  </div>

  <!-- Meal Edit Modal -->
  <div id="modal-overlay" class="modal-overlay hidden">
    <div class="modal" role="dialog" aria-modal="true">
      <div class="modal-header">
        <h3 id="modal-title" class="modal-title"></h3>
        <button id="modal-close" class="icon-btn">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>
      </div>
      <div class="modal-body">
        <div class="meal-field">
          <label class="field-label">🌅 Breakfast</label>
          <textarea id="field-breakfast" class="meal-input" rows="2" placeholder="e.g. Oats with berries and honey…"></textarea>
        </div>
        <div class="meal-field">
          <label class="field-label">☀️ Lunch</label>
          <textarea id="field-lunch" class="meal-input" rows="2" placeholder="e.g. Grilled chicken salad…"></textarea>
        </div>
        <div class="meal-field">
          <label class="field-label">🌙 Dinner</label>
          <textarea id="field-dinner" class="meal-input" rows="2" placeholder="e.g. Pasta with tomato sauce…"></textarea>
        </div>
        <div class="meal-field">
          <label class="field-label">🍎 Snack</label>
          <textarea id="field-snack" class="meal-input" rows="2" placeholder="e.g. Apple and peanut butter…"></textarea>
        </div>
      </div>
      <div class="modal-footer">
        <button id="modal-cancel" class="btn-secondary">Cancel</button>
        <button id="modal-save" class="btn-primary">Save Day</button>
      </div>
    </div>
  </div>

  <!-- Toast -->
  <div id="toast" class="toast hidden"></div>

  <script src="app.js"></script>
</body>
</html>
